<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Curriculum Generator</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:0;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:85%;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 0px 10px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
}

select{
    width:100%;
    padding:12px;
    margin-top:20px;
    font-size:18px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:blue;
    color:white;
    border:none;
    border-radius:5px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:darkblue;
}

.topic-box{
    margin-top:20px;
    padding:20px;
    background:#f9f9f9;
    border-radius:10px;
}

p{
    line-height:1.7;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Curriculum Generator</h1>

<select id="topic">

<option value="">Select Course</option>

<option value="java">Java</option>

<option value="python">Python</option>

<option value="c">C Language</option>

<option value="c++">C++</option>

<option value="html">HTML</option>

<option value="css">CSS</option>

<option value="javascript">JavaScript</option>

<option value="ai/ml">AI / ML</option>

</select>

<button onclick="generateCurriculum()">
Generate
</button>

<div id="result"></div>

</div>



<script>

function generateCurriculum(){

    let topic = document.getElementById("topic").value;

    if(topic === ""){

        document.getElementById("result").innerHTML = `
        <div class="topic-box">

        <h2>Please Select a Course</h2>

        </div>
        `;

        return;
    }

    let curriculum = `

    <div class="topic-box">

    <h2>
    Curriculum for ${topic.toUpperCase()}
    </h2>

    <button onclick="showModule('intro')">
    Module 1: Introduction
    </button>

    <button onclick="showModule('basic')">
    Module 2: Basics
    </button>

    <button onclick="showModule('intermediate')">
    Module 3: Intermediate
    </button>

    <button onclick="showModule('advanced')">
    Module 4: Advanced
    </button>

    <button onclick="showModule('projects')">
    Module 5: Projects
    </button>

    <div id="moduleContent"></div>

    </div>
    `;

    document.getElementById("result").innerHTML = curriculum;
}

let topic = document.getElementById("topic").value;

        Java is secure, portable,

        <div class="topic-box">
